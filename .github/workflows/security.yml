name: OWASP Security Scan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Start Juice Shop
        run: docker run -d -p 3000:3000 bkimminich/juice-shop

      - name: Wait for app
        run: |
          echo "Waiting for Juice Shop..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "App is up!"
              break
            fi
            sleep 2
          done

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run OWASP Scanner
        run: |
          python main.py scan \
            -t http://localhost:3000 \
            -y \
            --no-bruteforce \
            -o json \
            --output-dir reports

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/